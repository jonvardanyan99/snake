<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake game</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="assets/images/snake.png">
</head>
<body>
  <div class="snake-game">
    <div id="pause-wrapper" class="pause-wrapper">
      <button id="pause-btn" class="pause-btn">Pause Game</button>
      <p class="pause-text">Or press <span class="pause-key">ESC</span> to pause</p>
    </div>
    <div class="container">
      <canvas id="game" class="game" width="608px" height="608px"></canvas>
      <button id="play-again-btn" class="play-again-btn">Play Again</button>
    </div>
  </div>
  <script src="Snake/index.js"></script>
</body>
</html>
